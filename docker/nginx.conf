server {
  listen       80;
  server_name  _;
  root         /usr/share/nginx/html;
  index        index.html;

  # gzip for text assets
  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  # cache hashed assets aggressively
  location ~* \.(?:js|css|woff2?|ttf|eot|svg|jpg|jpeg|png|gif|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: every unknown path returns index.html so Angular Router handles it
  location / {
    try_files $uri $uri/ /index.html;
  }
}
