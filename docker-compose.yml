services:
  # Development: hot reload with ng serve inside the container.
  # Usage:  docker compose up dev
  dev:
    build:
      context: .
      target: dev
    container_name: anderson-portfolio-dev
    ports:
      - "4200:4200"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./angular.json:/app/angular.json
      - ./tailwind.config.js:/app/tailwind.config.js
      - ./postcss.config.js:/app/postcss.config.js
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.app.json:/app/tsconfig.app.json
      - ./tsconfig.spec.json:/app/tsconfig.spec.json
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

  # Production: nginx serving the built bundle.
  # Usage:  docker compose up prod
  prod:
    build:
      context: .
      target: runtime
    container_name: anderson-portfolio-prod
    ports:
      - "8080:80"
    restart: unless-stopped
